<!DOCTYPE html>
<html lang="ko" dir="ltr">
<head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Login</title>
    <link rel="stylesheet" href="css/common.css" />
    <link rel="stylesheet" href="css/login.css" />
</head>

<body>

<div class="update">
    <span class="badge">NEW</span>
    <span>마지막 업데이트 : <strong style="color: var(--text); font-weight: 800;">2026-04-03</strong></span>
</div>

<form class="login-card" action="src/finance.html" onsubmit="return validationForm()" method="get">
    <div class="card-inner">
        <div class="header">
            <span class="eyebrow">Welcome</span>
            <h1>김소연 전용 입장 ✨</h1>
            <p>이 페이지는 우리 추억 앨범이에요.<br/>이름을 입력하면 들어갈 수 있어요.</p>
        </div>

        <div class="field">
            <input class="input" type="text" name="id" placeholder="이름을 입력하세요." autocomplete="off" />
            <button class="btn" type="submit">입장하기</button>
        </div>

        <div class="footer">
            <button class="mini-btn" type="button" onclick="getAnniversary()">우리 만난 지 며칠째일까?</button>
            <div class="mini">
                <span>💙</span>
                <span class="passedDay"></span>
            </div>
        </div>
    </div>
</form>

<script>
    function validationForm(){
        const v = document.querySelector("input[name='id']").value.trim();
        if(v !== "김소연"){
            alert("당신의 이름을 정확히 입력하세요");
            return false;
        }
        return true;
    }

    function getAnniversary(){
        const firstDay = new Date('2017-09-02');
        const now = new Date();
        const passedDay = Math.round((now - firstDay) / (24*60*60*1000));
        document.querySelector(".passedDay").textContent = passedDay + "일째";
    }
</script>

</body>
</html>
