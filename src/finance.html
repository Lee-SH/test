function fmt(n) {
    if (!n) return "-";
    return n.toLocaleString("ko-KR") + "원";
}

/* ── 계좌이체 카테고리 ── */
function categorizeAccount(tx) {
    const d = tx.desc.toLowerCase();
    if (tx.deposit > 0) {
        if (d.includes("월급") || d.includes("급여")) return { name:"급여", cls:"cat-salary" };
        if (d.includes("이자")) return { name:"이자", cls:"cat-interest" };
        if (d.includes("캐쉬백")) return { name:"기타수입", cls:"cat-etc" };
        if (d.includes("환입")) return { name:"환입", cls:"cat-interest" };
        return { name:"입금", cls:"cat-salary" };
    }
    if (d.includes("관리비")) return { name:"주거", cls:"cat-housing" };
    if (d.includes("항공")) return { name:"여행", cls:"cat-travel" };
    if (d.includes("카드")) return { name:"카드결제", cls:"cat-card" };
    if (d.includes("대출") || d.includes("이자")) return { name:"금융", cls:"cat-finance" };
    if (d.includes("적금") || d.includes("자동이체")) return { name:"저축", cls:"cat-savings" };
    if (d.includes("코스트코") || d.includes("화분") || d.includes("풋샵")) return { name:"쇼핑/생활", cls:"cat-shopping" };
    if (d.includes("정산") || d.includes("개인") || d.includes("잔액정리")) return { name:"개인지출", cls:"cat-etc" };
    return { name:"기타", cls:"cat-etc" };
}

/* ── 카드결제 카테고리 ── */
function categorizeCard(tx) {
    const s = tx.store.toLowerCase();
    // 외식/식당
    if (/을밀대|열날개|램하우스|마포갈매기|쭈꾸미|칼국수|쇼몽|시칠리|기요한|왕소금|후엘고|앤티도트|길바닥|김가네/.test(s))
        return { name:"외식", cls:"cat-food", group:"food" };
    // 카페/베이커리
    if (/파네트|빈브라더스|텐퍼센트|어닝바|영앤도터스|파티세리|오늘|엔지니어링 클럽/.test(s))
        return { name:"카페", cls:"cat-cafe", group:"food" };
    // 편의점
    if (/씨유|cu|gs25/.test(s))
        return { name:"편의점", cls:"cat-conv", group:"food" };
    // 온라인쇼핑
    if (/쿠팡|컬리|플릭팜/.test(s))
        return { name:"온라인쇼핑", cls:"cat-shopping", group:"shopping" };
    // 생활용품
    if (/무인양품|다이소|쿠쿠/.test(s))
        return { name:"생활용품", cls:"cat-life", group:"shopping" };
    // 의류
    if (/에프알엘|유니클로/.test(s))
        return { name:"의류", cls:"cat-fashion", group:"shopping" };
    // 공과금
    if (/도시가스/.test(s))
        return { name:"공과금", cls:"cat-housing", group:"life" };
    // 교통/주유
    if (/주유|택시/.test(s))
        return { name:"교통/주유", cls:"cat-transport", group:"life" };
    // 구독
    if (/apple/.test(s))
        return { name:"구독", cls:"cat-sub", group:"life" };
    // 배달
    if (/쿠팡이츠/.test(s))
        return { name:"배달", cls:"cat-food", group:"food" };
    return { name:"기타", cls:"cat-etc", group:"life" };
}

/* ================================================================
   계좌 이체 뷰
   ================================================================ */
let acctMonth = "all";
let acctTxFilter = "all";

function getAcctFiltered() {
    let data = accountTx;
    if (acctMonth !== "all") {
        data = data.filter(tx => parseInt(tx.date.split("-")[1]) === parseInt(acctMonth));
    }
    return data;
}

function getAcctTableFiltered() {
    let data = getAcctFiltered();
    if (acctTxFilter === "income") data = data.filter(tx => tx.deposit > 0);
    if (acctTxFilter === "expense") data = data.filter(tx => tx.withdrawal > 0);
    return data;
}

function renderAcctSummary() {
    const data = getAcctFiltered();
    const totalIn = data.reduce((s,t) => s + t.deposit, 0);
    const totalOut = data.reduce((s,t) => s + t.withdrawal, 0);
    const lastBalance = accountTx[accountTx.length - 1].balance;

    document.getElementById("accountSummaryGrid").innerHTML = `
        <div class="summary-card">
            <div class="label">총 입금</div>
            <div class="value income">${fmt(totalIn)}</div>
            <div class="sub">${data.filter(t=>t.deposit>0).length}건</div>
        </div>
        <div class="summary-card">
            <div class="label">총 지출</div>
            <div class="value expense">${fmt(totalOut)}</div>
            <div class="sub">${data.filter(t=>t.withdrawal>0).length}건</div>
        </div>
        <div class="summary-card">
            <div class="label">순 수입</div>
            <div class="value ${totalIn - totalOut >= 0 ? 'income' : 'expense'}">${fmt(totalIn - totalOut)}</div>
        </div>
        <div class="summary-card">
            <div class="label">현재 잔액</div>
            <div class="value balance">${fmt(lastBalance)}</div>
            <div class="sub">3월 30일 기준</div>
        </div>
    `;
}

function renderAcctTable() {
    const data = [...getAcctTableFiltered()].reverse();
    document.getElementById("accountTxCount").textContent = data.length + "건";

    document.getElementById("accountTxBody").innerHTML = data.map(tx => {
        const cat = categorizeAccount(tx);
        return `<tr>
            <td class="tx-date">${tx.date.slice(5)}<br><span class="tx-time">${tx.time.slice(0,5)}</span></td>
            <td class="tx-desc">${tx.desc}</td>
            <td><span class="tx-category ${cat.cls}">${cat.name}</span></td>
            <td class="tx-amount income">${tx.deposit ? "+" + fmt(tx.deposit) : ""}</td>
            <td class="tx-amount expense">${tx.withdrawal ? "-" + fmt(tx.withdrawal) : ""}</td>
            <td class="tx-balance">${fmt(tx.balance)}</td>
        </tr>`;
    }).join("");

    document.getElementById("accountTxCardList").innerHTML = data.map(tx => {
        const cat = categorizeAccount(tx);
        const isIncome = tx.deposit > 0;
        const amount = isIncome ? "+" + fmt(tx.deposit) : "-" + fmt(tx.withdrawal);
        return `<div class="tx-card-item">
            <div class="tx-card-top">
                <span class="tx-card-desc">${tx.desc}</span>
                <span class="tx-card-amount ${isIncome ? 'income' : 'expense'}">${amount}</span>
            </div>
            <div class="tx-card-bottom">
                <span>${tx.date.slice(5)} ${tx.time.slice(0,5)}</span>
                <span class="tx-category ${cat.cls}">${cat.name}</span>
                <span class="tx-card-balance">잔액 ${fmt(tx.balance)}</span>
            </div>
        </div>`;
    }).join("");
}

let acctMonthlyChart, acctCategoryChart;

function renderAcctMonthlyChart() {
    const months = ["2월", "3월"];
    const incomeByMonth = [0, 0];
    const expenseByMonth = [0, 0];

    accountTx.forEach(tx => {
        const m = parseInt(tx.date.split("-")[1]) - 2;
        if (m >= 0 && m < 2) {
            incomeByMonth[m] += tx.deposit;
            expenseByMonth[m] += tx.withdrawal;
        }
    });

    const ctx = document.getElementById("accountMonthlyChart").getContext("2d");
    if (acctMonthlyChart) acctMonthlyChart.destroy();

    acctMonthlyChart = new Chart(ctx, {
        type: "bar",
        data: {
            labels: months,
            datasets: [
                { label: "입금", data: incomeByMonth, backgroundColor: "rgba(46,139,87,0.65)", borderRadius: 6 },
                { label: "지출", data: expenseByMonth, backgroundColor: "rgba(211,84,80,0.65)", borderRadius: 6 }
            ]
        },
        options: {
            responsive: true,
            plugins: {
                legend: { position: "bottom", labels: { boxWidth: 12, padding: 16, font: { size: 12 } } },
                tooltip: { callbacks: { label: ctx => ctx.dataset.label + ": " + fmt(ctx.raw) } }
            },
            scales: {
                y: { beginAtZero: true, ticks: { callback: v => (v/10000).toLocaleString() + "만", font: { size: 11 } }, grid: { color: "rgba(0,0,0,0.04)" } },
                x: { grid: { display: false } }
            }
        }
    });
}

function renderAcctCategoryChart() {
    const data = getAcctFiltered().filter(t => t.withdrawal > 0);
    const catMap = {};
    data.forEach(tx => {
        const cat = categorizeAccount(tx);
        catMap[cat.name] = (catMap[cat.name] || 0) + tx.withdrawal;
    });

    const sorted = Object.entries(catMap).sort((a,b) => b[1] - a[1]);
    const labels = sorted.map(e => e[0]);
    const values = sorted.map(e => e[1]);
    const colors = ["#e8985e","#5a8fcc","#2e8b57","#d35450","#8e6bbf","#e6a23c","#5dade2","#999","#66bb6a"];

    const ctx = document.getElementById("accountCategoryChart").getContext("2d");
    if (acctCategoryChart) acctCategoryChart.destroy();

    acctCategoryChart = new Chart(ctx, {
        type: "doughnut",
        data: { labels, datasets: [{ data: values, backgroundColor: colors.slice(0, labels.length), borderWidth: 0, spacing: 2 }] },
        options: {
            responsive: true, cutout: "55%",
            plugins: {
                legend: { position: "bottom", labels: { boxWidth: 10, padding: 12, font: { size: 12 } } },
                tooltip: { callbacks: { label: ctx => ctx.label + ": " + fmt(ctx.raw) } }
            }
        }
    });
}

/* ── 계좌이체 이벤트 ── */
document.getElementById("accountMonthTabs").addEventListener("click", (e) => {
    const btn = e.target.closest(".month-tab");
    if (!btn) return;
    document.querySelectorAll("#accountMonthTabs .month-tab").forEach(b => b.classList.remove("active"));
    btn.classList.add("active");
    acctMonth = btn.dataset.month;
    renderAcctSummary(); renderAcctTable(); renderAcctCategoryChart();
});

document.getElementById("accountTxFilterTabs").addEventListener("click", (e) => {
    const btn = e.target.closest(".tx-filter");
    if (!btn) return;
    document.querySelectorAll("#accountTxFilterTabs .tx-filter").forEach(b => b.classList.remove("active"));
    btn.classList.add("active");
    acctTxFilter = btn.dataset.filter;
    renderAcctTable();
});

/* ================================================================
   카드 결제 뷰
   ================================================================ */
let cardMonth = "all";
let cardCatFilter = "all";

function getCardFiltered() {
    let data = cardTx;
    if (cardMonth !== "all") {
        data = data.filter(tx => parseInt(tx.date.split("-")[1]) === parseInt(cardMonth));
    }
    return data;
}

function getCardTableFiltered() {
    let data = getCardFiltered();
    if (cardCatFilter !== "all") {
        data = data.filter(tx => categorizeCard(tx).group === cardCatFilter);
    }
    return data;
}

function renderCardSummary() {
    const data = getCardFiltered();
    const total = data.reduce((s,t) => s + t.amount, 0);
    const credit = data.filter(t => t.cardType === "신용");
    const check = data.filter(t => t.cardType === "체크");

    document.getElementById("cardSummaryGrid").innerHTML = `
        <div class="summary-card">
            <div class="label">총 결제금액</div>
            <div class="value expense">${fmt(total)}</div>
            <div class="sub">${data.length}건</div>
        </div>
        <div class="summary-card">
            <div class="label">신용카드</div>
            <div class="value expense">${fmt(credit.reduce((s,t) => s + t.amount, 0))}</div>
            <div class="sub">${credit.length}건</div>
        </div>
        <div class="summary-card">
            <div class="label">체크카드</div>
            <div class="value expense">${fmt(check.reduce((s,t) => s + t.amount, 0))}</div>
            <div class="sub">${check.length}건</div>
        </div>
        <div class="summary-card">
            <div class="label">건당 평균</div>
            <div class="value balance">${fmt(Math.round(total / data.length))}</div>
            <div class="sub">최대 ${fmt(Math.max(...data.map(t=>t.amount)))}</div>
        </div>
    `;
}

function renderCardTable() {
    const data = [...getCardTableFiltered()].reverse();
    document.getElementById("cardTxCount").textContent = data.length + "건";

    document.getElementById("cardTxBody").innerHTML = data.map(tx => {
        const cat = categorizeCard(tx);
        return `<tr>
            <td class="tx-date">${tx.date.slice(5)}<br><span class="tx-time">${tx.time}</span></td>
            <td class="tx-desc">${tx.store}</td>
            <td><span class="tx-category ${cat.cls}">${cat.name}</span></td>
            <td class="tx-card-type"><span class="card-badge ${tx.cardType === '신용' ? 'credit' : 'debit'}">${tx.cardType}</span></td>
            <td class="tx-amount expense">${fmt(tx.amount)}</td>
        </tr>`;
    }).join("");

    document.getElementById("cardTxCardList").innerHTML = data.map(tx => {
        const cat = categorizeCard(tx);
        return `<div class="tx-card-item">
            <div class="tx-card-top">
                <span class="tx-card-desc">${tx.store}</span>
                <span class="tx-card-amount expense">${fmt(tx.amount)}</span>
            </div>
            <div class="tx-card-bottom">
                <span>${tx.date.slice(5)} ${tx.time}</span>
                <span class="tx-category ${cat.cls}">${cat.name}</span>
                <span class="card-badge ${tx.cardType === '신용' ? 'credit' : 'debit'}">${tx.cardType}</span>
            </div>
        </div>`;
    }).join("");
}

let cardMonthChart, cardCatChart;

function renderCardMonthlyChart() {
    const months = ["2월", "3월"];
    const amountByMonth = [0, 0];

    cardTx.forEach(tx => {
        const m = parseInt(tx.date.split("-")[1]) - 2;
        if (m >= 0 && m < 2) amountByMonth[m] += tx.amount;
    });

    const ctx = document.getElementById("cardMonthlyChart").getContext("2d");
    if (cardMonthChart) cardMonthChart.destroy();

    cardMonthChart = new Chart(ctx, {
        type: "bar",
        data: {
            labels: months,
            datasets: [{ label: "카드 결제", data: amountByMonth, backgroundColor: ["rgba(90,143,204,0.65)","rgba(232,152,94,0.65)"], borderRadius: 6 }]
        },
        options: {
            responsive: true,
            plugins: {
                legend: { position: "bottom", labels: { boxWidth: 12, padding: 16, font: { size: 12 } } },
                tooltip: { callbacks: { label: ctx => fmt(ctx.raw) } }
            },
            scales: {
                y: { beginAtZero: true, ticks: { callback: v => (v/10000).toLocaleString() + "만", font: { size: 11 } }, grid: { color: "rgba(0,0,0,0.04)" } },
                x: { grid: { display: false } }
            }
        }
    });
}

function renderCardCategoryChart() {
    const data = getCardFiltered();
    const catMap = {};
    data.forEach(tx => {
        const cat = categorizeCard(tx);
        catMap[cat.name] = (catMap[cat.name] || 0) + tx.amount;
    });

    const sorted = Object.entries(catMap).sort((a,b) => b[1] - a[1]);
    const labels = sorted.map(e => e[0]);
    const values = sorted.map(e => e[1]);
    const colors = ["#e8985e","#5a8fcc","#2e8b57","#d35450","#8e6bbf","#e6a23c","#5dade2","#66bb6a","#ef9a9a","#999"];

    const ctx = document.getElementById("cardCategoryChart").getContext("2d");
    if (cardCatChart) cardCatChart.destroy();

    cardCatChart = new Chart(ctx, {
        type: "doughnut",
        data: { labels, datasets: [{ data: values, backgroundColor: colors.slice(0, labels.length), borderWidth: 0, spacing: 2 }] },
        options: {
            responsive: true, cutout: "55%",
            plugins: {
                legend: { position: "bottom", labels: { boxWidth: 10, padding: 12, font: { size: 12 } } },
                tooltip: { callbacks: { label: ctx => ctx.label + ": " + fmt(ctx.raw) } }
            }
        }
    });
}

/* ── 카드결제 이벤트 ── */
document.getElementById("cardMonthTabs").addEventListener("click", (e) => {
    const btn = e.target.closest(".month-tab");
    if (!btn) return;
    document.querySelectorAll("#cardMonthTabs .month-tab").forEach(b => b.classList.remove("active"));
    btn.classList.add("active");
    cardMonth = btn.dataset.month;
    renderCardSummary(); renderCardTable(); renderCardCategoryChart();
});

document.getElementById("cardFilterTabs").addEventListener("click", (e) => {
    const btn = e.target.closest(".tx-filter");
    if (!btn) return;
    document.querySelectorAll("#cardFilterTabs .tx-filter").forEach(b => b.classList.remove("active"));
    btn.classList.add("active");
    cardCatFilter = btn.dataset.cat;
    renderCardTable();
});

/* ================================================================
   뷰 탭 전환
   ================================================================ */
let cardInitialized = false;

document.getElementById("viewTabs").addEventListener("click", (e) => {
    const btn = e.target.closest(".view-tab");
    if (!btn) return;

    document.querySelectorAll(".view-tab").forEach(b => b.classList.remove("active"));
    btn.classList.add("active");

    const view = btn.dataset.view;
    document.getElementById("accountView").classList.toggle("active", view === "account");
    document.getElementById("cardView").classList.toggle("active", view === "card");

    if (view === "card" && !cardInitialized) {
        cardInitialized = true;
        renderCardSummary();
        renderCardTable();
        renderCardMonthlyChart();
        renderCardCategoryChart();
    }
});

/* ── 초기 렌더 (계좌이체) ── */
renderAcctSummary();
renderAcctTable();
renderAcctMonthlyChart();
renderAcctCategoryChart();
</script>
